server:
  port: 5002

spring:
  application:
    name: detect-service
  datasource:
    url: jdbc:mysql://localhost:3306/gian_lan_detect?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: "123456"
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:9999/eureka/
  instance:
    preferIpAddress: true
    instance-id: ${spring.application.name}:${server.port}
